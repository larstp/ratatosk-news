<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed - Ratatosk</title>
    <link rel="icon" type="image/svg+xml" href="ratatosk_logo.svg" />
    <link rel="stylesheet" href="css/output.css" />
    <script src="js/posts.js" type="module"></script>
    <style>
      :root {
        --color-darkest: #091413;
        --color-dark: #285a48;
        --color-medium: #408a71;
        --color-light: #b0e4cc;
        --color-contrast: #e38d37;
      }

      body {
        background:
          radial-gradient(
            circle at 12% 20%,
            var(--color-medium) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 90% 80%,
            var(--color-dark) 0%,
            transparent 45%
          ),
          var(--color-darkest);
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="p-5 text-white">
    <main class="mx-auto w-full max-w-3xl">
      <header
        class="mb-4 rounded-lg p-4"
        style="
          background-color: var(--color-dark);
          border: 1px solid var(--color-medium);
        "
      >
        <div class="flex items-center justify-between gap-4">
          <h1 class="text-2xl font-bold">Ratatosk Feed</h1>
          <a
            href="index.html"
            class="rounded-full px-4 py-2 text-sm font-semibold"
            style="
              background-color: var(--color-contrast);
              color: var(--color-darkest);
            "
          >
            Back to Home
          </a>
        </div>
      </header>

      <section
        id="createPostSection"
        class="mb-4 hidden rounded-lg p-4"
        style="
          background-color: var(--color-dark);
          border: 1px solid var(--color-medium);
        "
      >
        <h2 class="mb-3 text-lg font-semibold">Create Post</h2>
        <form id="createPostForm" class="flex flex-col gap-3">
          <input
            type="text"
            id="postTitle"
            name="title"
            placeholder="Post title"
            required
            class="rounded border border-gray-500 bg-gray-900 px-3 py-2 text-white placeholder-gray-500 focus:outline-none"
          />
          <textarea
            id="postBody"
            name="body"
            rows="4"
            placeholder="Write your post"
            required
            class="rounded border border-gray-500 bg-gray-900 px-3 py-2 text-white placeholder-gray-500 focus:outline-none"
          ></textarea>
          <button
            type="submit"
            class="w-fit rounded-full px-6 py-2 font-semibold"
            style="
              background-color: var(--color-contrast);
              color: var(--color-darkest);
            "
          >
            Publish
          </button>
        </form>
      </section>

      <section
        id="postsSection"
        class="rounded-lg p-4"
        style="
          background-color: var(--color-dark);
          border: 1px solid var(--color-medium);
        "
      >
        <h2 class="mb-3 text-lg font-semibold">Latest Posts</h2>
        <div id="postsContainer" class="flex flex-col gap-3"></div>
      </section>
    </main>
  </body>
</html>
