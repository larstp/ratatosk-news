<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed - Ratatosk</title>
    <link rel="icon" type="image/svg+xml" href="ratatosk_logo.svg" />
    <link rel="stylesheet" href="css/output.css" />
    <script src="js/posts.js" type="module"></script>
    <style>
      :root {
        --color-darkest: #091413;
        --color-dark: #285a48;
        --color-medium: #408a71;
        --color-light: #b0e4cc;
        --color-contrast: #e38d37;
      }

      body {
        background:
          radial-gradient(
            circle at 12% 20%,
            var(--color-medium) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 90% 80%,
            var(--color-dark) 0%,
            transparent 45%
          ),
          var(--color-darkest);
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="p-5 pt-24 text-white">
    <header
      class="fixed inset-x-0 top-0 z-50 border-b px-4 py-3 backdrop-blur"
      style="
        background-color: rgba(9, 20, 19, 0.9);
        border-color: rgba(64, 138, 113, 0.55);
      "
    >
      <div
        class="mx-auto flex w-full max-w-3xl items-center justify-between gap-4"
      >
        <a href="index.html" class="flex items-center gap-3">
          <img src="ratatosk_logo.svg" alt="Ratatosk logo" class="h-9 w-9" />
          <span class="text-lg font-semibold">Ratatosk News Feed</span>
        </a>

        <div id="guestActions" class="flex items-center gap-2">
          <a
            href="login.html"
            class="rounded-full px-4 py-2 text-sm font-semibold"
            style="
              background-color: var(--color-contrast);
              color: var(--color-darkest);
            "
          >
            Log In
          </a>
          <a
            href="register.html"
            class="rounded-full px-4 py-2 text-sm font-semibold"
            style="
              background-color: var(--color-contrast);
              color: var(--color-darkest);
            "
          >
            Register
          </a>
        </div>

        <button
          id="logoutButton"
          type="button"
          class="hidden rounded-full px-4 py-2 text-sm font-semibold"
          style="
            background-color: var(--color-contrast);
            color: var(--color-darkest);
          "
        >
          Log Out
        </button>
      </div>
    </header>

    <main class="mx-auto w-full max-w-3xl">
      <section
        id="createPostSection"
        class="mb-4 hidden rounded-lg p-4"
        style="
          background-color: var(--color-dark);
          border: 1px solid var(--color-medium);
        "
      >
        <div class="mb-3 flex items-center justify-between gap-3">
          <h2 class="text-lg font-semibold">Create Post</h2>
          <button
            id="toggleCreatePostButton"
            type="button"
            class="rounded-full px-4 py-2 text-sm font-semibold"
            style="
              background-color: var(--color-contrast);
              color: var(--color-darkest);
            "
          >
            Expand
          </button>
        </div>

        <div id="createPostContent" class="hidden">
          <form id="createPostForm" class="flex flex-col gap-3">
            <fieldset class="flex flex-col gap-3">
              <input
                type="text"
                id="postTitle"
                name="title"
                placeholder="Post title"
                required
                class="rounded border border-gray-500 bg-gray-900 px-3 py-2 text-white placeholder-gray-500 focus:outline-none"
              />
              <textarea
                id="postContent"
                name="content"
                rows="4"
                placeholder="Write your post"
                required
                class="rounded border border-gray-500 bg-gray-900 px-3 py-2 text-white placeholder-gray-500 focus:outline-none"
              ></textarea>
              <button
                type="submit"
                class="w-fit rounded-full px-6 py-2 font-semibold"
                style="
                  background-color: var(--color-contrast);
                  color: var(--color-darkest);
                "
              >
                Publish
              </button>
            </fieldset>
          </form>
          <div id="errorMessage" class="mt-3 hidden"></div>
          <div id="successMessage" class="mt-3 hidden"></div>
        </div>
      </section>

      <section
        id="posts-list"
        class="rounded-lg p-4"
        style="
          background-color: var(--color-dark);
          border: 1px solid var(--color-medium);
        "
      >
        <h2 class="mb-3 text-lg font-semibold">Latest Posts</h2>
        <div id="postsMessage" class="mb-3 hidden"></div>
        <div id="postsContainer" class="flex flex-col gap-3"></div>
      </section>
    </main>
  </body>
</html>
